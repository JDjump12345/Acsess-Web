<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

  <link rel="stylesheet" href="style.css">

  <title>hi</title>
      <link rel="icon" type="image/x-icon" href="/ico.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

  
<body onload="createTab(); loadSettings();">

 <div class="title-bar">
    <div class="title-text">Acsess Web</div>
    <div class="title-bar-actions">
                  <button id="SettingBtn">⚙</button>
<button id="MenuBtn">☰</button>
      <button id="minimize-app">🗕</button>
      <button id="closeBtn">✕</button>

    </div>
  </div>
  <div id="navbar">
        <button id="newtab" onclick="createTab()">+</button>
    <button id="back" onclick="goBack()">◀</button>
    <button id="forward" onclick="goForward()">▶</button>
    <button id="reload" onclick="refresh()">⟳</button>
    <input id="url" type="text" value="https://google.com" />
    <button id="go" onclick="goToUrl()">Go</button>
        <button id="bookmark" onclick="bookmark()">☆</button>
        <button id="saved" onclick="showSavedBookmarks()"></button>

  </div>
  <div class="settings-panel" id="settingsPanel" style="display:none;">
  <h2>Settings</h2>
        <label for="enable-talkback">Enable TalkBack</label>
        <input type="checkbox" id="enable-talkback" />
        <button id="save-settings" onclick="saveSettings()">Save Settings</button>
</div>
 <div class="Menu-panel" id="MenuPanel" style="display:none;">
  <h2>Menu</h2>
        <button id="cookies" onclick="toggleCookiesPanel()">Manage cookies PS: this button dont work rn</button> 

        <button id="MenuCloseBtn" onclick="MenuClose()">Close Menu</button>
</div>
<div id="bookmarks-list" style="display:none;">
  <h2>Saved Bookmarks</h2>
</div>
<div id="cookie-panel" class="cookie-panel hidden">
  <div class="cookie-panel-header">
    <h2>Cookies</h2>
    <div class="cookie-panel-actions">
      <button id="refresh-cookies" type="button">Refresh</button>
      <button id="clear-cookies" type="button">Clear Cookies</button>
    </div>
  </div>
  <div id="cookie-status" class="cookie-status">No active tab selected.</div>
  <div id="cookie-list" class="cookie-list"></div>
  <form id="set-cookie-form" class="cookie-form">
    <input id="cookie-name" type="text" placeholder="Name" />
    <input id="cookie-value" type="text" placeholder="Value" />
    <button id="set-cookie" type="submit">Set Cookie</button>
  </form>
</div>

<div id="Download-Request" class="Download-Request" style="display:none;">
  <h2>Download Request</h2>
  <p id="download-info"></p>
  <button id="Save-download">Save</button>
  <button id="Decline-download">Decline</button>
</div>
<div id="tabs"></div>
<div id="WebContentsView" class="webview-container" preload="./preload.js"></div>


    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="renderer.js"></script>

    <script>
      loadSettings();
    </script>
    <script>

      </script>
    <script src="https://code.jquery.com/jquery-3.3.1.min.js"></script>
<script src="https://code.jquery.com/ui/1.12.1/jquery-ui.js"></script>
<script src="jquery.jfMagnify.js"></script>


<!-- NERD -->
</body>
</html>
